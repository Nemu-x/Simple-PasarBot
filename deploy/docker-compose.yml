services:
  api:
    build:
      context: ..
      dockerfile: deploy/images/api.Dockerfile
    env_file: ../.env
    command: sh -c "npm --prefix /app run migrate && npm run dev"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  bot:
    build:
      context: ..
      dockerfile: deploy/images/bot.Dockerfile
    env_file: ../.env
    depends_on:
      api:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: deploy/images/worker.Dockerfile
    env_file: ../.env
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
