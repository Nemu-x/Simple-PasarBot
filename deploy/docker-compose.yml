services:
  api:
    build:
      context: ..
      dockerfile: deploy/images/api.Dockerfile
    env_file: ../.env
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis

  bot:
    build:
      context: ..
      dockerfile: deploy/images/bot.Dockerfile
    env_file: ../.env
    depends_on:
      - api

  worker:
    build:
      context: ..
      dockerfile: deploy/images/worker.Dockerfile
    env_file: ../.env
    depends_on:
      - api
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
