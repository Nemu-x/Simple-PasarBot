services:
  api:
    build:
      context: ..
      dockerfile: deploy/images/api.Dockerfile
    env_file: ../.env
    command: sh -c "npm --prefix /app run migrate && npm run dev"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  bot:
    build:
      context: ..
      dockerfile: deploy/images/bot.Dockerfile
    env_file: ../.env
    depends_on:
      api:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: deploy/images/worker.Dockerfile
    env_file: ../.env
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  admin-web:
    build:
      context: ..
      dockerfile: deploy/images/admin-web.Dockerfile
    env_file: ../.env
    depends_on:
      api:
        condition: service_started

  miniapp:
    build:
      context: ..
      dockerfile: deploy/images/miniapp.Dockerfile
    env_file: ../.env
    environment:
      MINIAPP_PORT: 3200
    depends_on:
      api:
        condition: service_started

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7

  nginx:
    image: nginx:1.27-alpine
    env_file: ../.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      api:
        condition: service_started
      admin-web:
        condition: service_started
      miniapp:
        condition: service_started

  certbot:
    image: certbot/certbot:latest
    env_file: ../.env
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c
    command: "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

volumes:
  pgdata:
